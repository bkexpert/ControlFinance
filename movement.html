<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova movimentação | Finance Pro</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<body data-page="movement">
  <div class="app-layout">
    <aside class="sidebar" aria-label="Menu lateral">
      <div class="sidebar-header">
        <a class="brand-link" href="dashboard.html" aria-label="Finance Pro">
          <span class="brand-mark" aria-hidden="true">FP</span>
          <span class="brand-text">Finance Pro</span>
        </a>
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Ocultar menu lateral" aria-expanded="true">☰</button>
      </div>

      <nav class="side-nav" aria-label="Navegação principal">
        <a class="nav-link" href="dashboard.html" aria-label="Dashboard" title="Dashboard">
          <span class="nav-icon" aria-hidden="true">D</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-link active" href="movement.html" aria-current="page" aria-label="Nova movimentação" title="Nova movimentação">
          <span class="nav-icon" aria-hidden="true">+</span>
          <span class="nav-label">Nova movimentação</span>
        </a>
        <a class="nav-link" href="settings.html" aria-label="Opções" title="Opções">
          <span class="nav-icon" aria-hidden="true">O</span>
          <span class="nav-label">Opções</span>
        </a>
      </nav>

      <button id="logoutBtn" class="ghost-button sidebar-logout" type="button">Sair</button>
    </aside>

    <main class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Nova movimentação</p>
          <h1 id="movementProfileName">Registrar valor</h1>
        </div>
      </header>

      <section class="panel movement-page-panel" aria-labelledby="movementTitle">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Lançamento financeiro</p>
            <h2 id="movementTitle">Dados da movimentação</h2>
          </div>
        </div>

        <form id="movementForm" class="form-stack movement-page-form">
          <input id="movementId" type="hidden">

          <label class="field-wide">
            <span>Título</span>
            <input id="movementName" type="text" maxlength="90" required>
          </label>

          <div class="form-row">
            <label>
              <span>Valor</span>
              <input id="movementValue" type="number" min="0" step="0.01" inputmode="decimal" required>
            </label>

            <label>
              <span>Tipo</span>
              <select id="movementType" required>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
                <option value="investimento">Investimento</option>
              </select>
            </label>
          </div>

          <div class="form-row">
            <label>
              <span>Categoria</span>
              <select id="movementCategory" required></select>
            </label>

            <label>
              <span>Data</span>
              <input id="movementDate" type="date">
            </label>
          </div>

          <div class="button-row movement-actions">
            <button id="saveMovementBtn" class="primary-button" type="submit">Salvar movimentação</button>
            <button id="cancelMovementEditBtn" class="secondary-button hidden" type="button">Cancelar</button>
          </div>

          <p id="movementFeedback" class="feedback" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </div>

  <div id="toastArea" class="toast-area" aria-live="polite"></div>
</body>
</html>
